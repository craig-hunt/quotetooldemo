app = 'quotedemo-invoices'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  SERVICE_PORT = '8080'
  LOG_LEVEL = 'info'
  ORDERS_SERVICE_URL = 'https://quotedemo-orders.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
